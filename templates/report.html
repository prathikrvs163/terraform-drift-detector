<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraform Drift Report</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div class="container">

    <header class="page-head">
        <div class="brand">
            <img src="../static/terraform.svg" class="logo" alt="Terraform">
            <div>
                <h1>Terraform Drift Report</h1>
                <p class="generated">
                    <span class="gen-date">{{generated_date}}</span>
                    <span class="gen-time">{{generated_time}}</span>
                </p>
            </div>
        </div>
        <span class="status-pill {{status_class}}">{{status}}</span>
    </header>

    <section class="summary">
        <div class="card">
            <span class="card-label">Resources Checked</span>
            <span class="card-value">{{checked}}</span>
        </div>
        <div class="card {{drift_card_class}}">
            <span class="card-label">Resources Drifted</span>
            <span class="card-value">{{drifted}}</span>
        </div>
        <div class="card">
            <span class="card-label">In Sync</span>
            <span class="card-value">{{in_sync}}</span>
        </div>
    </section>

    {{resource_panels}}

    <footer class="page-foot">
        <span>Generated by Terraform Drift Detector</span>
        <span class="version">Version 1.0</span>
    </footer>

</div>
</body>
</html>
